version: "3.9"

services:
  fhir:
    image: hapiproject/hapi:v7.4.0
    container_name: prior-auth-hapi
    ports:
      - "8082:8080"
    volumes:
      - hapi-data:/data/hapi
      - ./docker/hapi/igs:/igs:ro
      - ./docker/hapi/application.yaml:/data/hapi/application.yaml:ro
    environment:
      SPRING_CONFIG_LOCATION: /data/hapi/application.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/fhir/metadata > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  synthea:
    build:
      context: docker/synthea
      dockerfile: Dockerfile
    image: prior-auth-synthea:latest
    profiles:
      - tools   # only runs when explicitly invoked; not started by `make fhir-up`
    volumes:
      - ./out/synthea/fhir:/output
      - ./data/synthea-config/modules:/modules:ro
      - ./data/synthea-config/synthea.properties:/synthea/synthea.properties:ro
    # Command and -p / -s flags are passed at runtime by load_synthea.py generate.

  mcp-fhir:
    # mcp-fhir in SSE mode — for MCP Inspector / Claude Desktop / Phase 4.5+.
    # For the LangGraph Evidence Gatherer node (Issue #5), call tools.py directly
    # (no Docker hop needed — Python-to-Python import).
    image: python:3.12-slim
    container_name: prior-auth-mcp-fhir
    profiles:
      - tools   # explicit only; not started by `make fhir-up`
    command: >
      sh -c "pip install mcp-fhir --quiet && mcp-fhir"
    ports:
      - "8084:8000"
    environment:
      FHIR_BASE_URL: "http://fhir:8080/fhir"   # inside compose network HAPI is on :8080
      HAPI_VALIDATOR_URL: "http://localhost:8083"

  payer-fhir:
    # Mock payer PAS $submit endpoint (ADR-0009).
    # Separate HAPI instance with Da Vinci PAS profile loaded for $validate.
    image: hapiproject/hapi:v7.4.0
    container_name: prior-auth-payer-fhir
    ports:
      - "8090:8080"
    volumes:
      - payer-hapi-data:/data/hapi
      - ./docker/payer-hapi/igs:/igs:ro
      - ./docker/payer-hapi/application.yaml:/data/hapi/application.yaml:ro
    environment:
      SPRING_CONFIG_LOCATION: /data/hapi/application.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/fhir/metadata > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
      MCP_TRANSPORT: "sse"
      MCP_PORT: "8000"
      LOG_FORMAT: "console"
      SMART_ENABLED: "false"
    depends_on:
      fhir:
        condition: service_healthy

volumes:
  hapi-data:
    name: prior-auth-hapi-data
  payer-hapi-data:
    name: prior-auth-payer-hapi-data
