# =============================================================================
# Synthea generation settings — Prior-Auth Co-pilot Phase 4.2
# Used by: docker/synthea/Dockerfile (mounted at /synthea/synthea.properties)
# =============================================================================

# --- Output ------------------------------------------------------------------
# Container writes FHIR bundles here; host mounts out/synthea/fhir/ at /output.
exporter.baseDirectory = /output/

# FHIR R4 export on; CSV/JSON/hospital/practitioner off (keeps bundles lean).
exporter.fhir.export = true
exporter.hospital.fhir.export = false
exporter.practitioner.fhir.export = false
exporter.csv.export = false
exporter.json.export = false

# One FHIR bundle file per patient (easier for the loader to iterate).
exporter.use_uuid_filenames = true

# --- Patient generation ------------------------------------------------------
# Only living patients; the curate script does not filter on alive/dead but
# "evidence-missing" cases are more realistic with living patients.
generate.only_alive_patients = true

# Default population — overridden at runtime via -p flag.
generate.default_population = 200

# Simulation timestep: 1 week in milliseconds (Synthea default; keep as-is).
generate.timestep = 604800000

# --- Module loading ----------------------------------------------------------
# The custom low_back_pain.json module is passed via -d /modules at runtime.
# No property override needed here; all other stock modules remain active.
# To run ONLY the custom module (faster, fewer unrelated conditions):
#   add -m low_back_pain to the docker run / compose run command.
